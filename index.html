<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Usage Widget — ดูโควตา Claude จาก menu bar</title>
<meta name="description" content="macOS menu bar app สำหรับดูโควตาการใช้งาน Claude แบบเรียลไทม์ ดาวน์โหลดฟรี">
<link rel="icon" type="image/png" href="icon.png">
<style>
  :root {
    --bg: #0f0e0c;
    --bg-card: #1a1815;
    --accent: #d97757;
    --accent-soft: rgba(217, 119, 87, 0.14);
    --text: #f0ece6;
    --text-dim: #a09a90;
    --green: #34c778;
    --yellow: #f2b01e;
    --border: rgba(240, 236, 230, 0.09);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Thai", "Segoe UI", "Noto Sans Thai", "Noto Sans Lao", "Noto Sans Myanmar", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    overflow-x: hidden;
  }
  .glow {
    position: fixed;
    top: -300px; left: 50%;
    transform: translateX(-50%);
    width: 900px; height: 600px;
    background: radial-gradient(ellipse, rgba(217,119,87,0.16), transparent 65%);
    pointer-events: none;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 0 24px; position: relative; }

  /* Language selector */
  .lang-select {
    position: fixed;
    top: 18px; right: 20px;
    z-index: 10;
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 7px 10px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
  }
  .lang-select:hover { border-color: rgba(240,236,230,0.25); }

  /* Hero */
  header { padding: 90px 0 50px; text-align: center; }
  .logo {
    width: 88px; height: 88px;
    margin: 0 auto 28px;
    display: block;
    filter: drop-shadow(0 12px 30px rgba(217,119,87,0.4));
  }
  h1 { font-size: clamp(32px, 6vw, 52px); font-weight: 800; letter-spacing: -1px; }
  h1 .accent { color: var(--accent); }
  .subtitle {
    margin: 18px auto 0;
    max-width: 560px;
    font-size: 18px;
    color: var(--text-dim);
  }
  .cta { margin-top: 36px; display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 15px 32px;
    border-radius: 14px;
    font-size: 17px; font-weight: 700;
    text-decoration: none;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-primary {
    background: linear-gradient(135deg, #e08663, #c85f3c);
    color: #fff;
    box-shadow: 0 8px 30px rgba(217,119,87,0.4);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(217,119,87,0.55); }
  .btn-secondary {
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { transform: translateY(-2px); border-color: rgba(240,236,230,0.25); }
  .version-note { margin-top: 14px; font-size: 13px; color: var(--text-dim); }

  /* Widget mockup */
  .mockup-wrap { display: flex; justify-content: center; padding: 30px 0 10px; }
  .mockup {
    width: 320px;
    background: rgba(30, 28, 24, 0.9);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    backdrop-filter: blur(20px);
    text-align: left;
  }
  .mockup .m-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .mockup .m-icon {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, #e08663, #c05f3e);
    display: flex; align-items: center; justify-content: center; font-size: 15px;
  }
  .mockup .m-title { font-size: 13px; font-weight: 700; }
  .mockup .m-sub { font-size: 10px; color: var(--text-dim); }
  .m-card {
    background: rgba(240,236,230,0.045);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .m-row { display: flex; justify-content: space-between; font-size: 11.5px; margin-bottom: 6px; }
  .m-pct-g { color: var(--green); font-weight: 700; }
  .m-pct-y { color: var(--yellow); font-weight: 700; }
  .m-bar { height: 6px; border-radius: 99px; background: rgba(240,236,230,0.08); overflow: hidden; }
  .m-fill { height: 100%; border-radius: 99px; }
  .m-reset { font-size: 9.5px; color: var(--text-dim); margin-top: 5px; }

  /* Features */
  section { padding: 70px 0; }
  h2 { font-size: 30px; font-weight: 800; text-align: center; margin-bottom: 42px; letter-spacing: -0.5px; }
  .features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
    gap: 16px;
  }
  .feature {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }
  .feature .f-emoji { font-size: 26px; }
  .feature h3 { font-size: 16px; margin: 12px 0 6px; }
  .feature p { font-size: 14px; color: var(--text-dim); }

  /* Install steps */
  .steps { max-width: 620px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
  .step {
    display: flex; gap: 16px; align-items: flex-start;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
  }
  .step-num {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 800; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .step p { font-size: 14.5px; }
  .step code {
    background: rgba(240,236,230,0.08);
    padding: 2px 7px; border-radius: 6px;
    font-size: 13px;
  }
  .step .dim { color: var(--text-dim); font-size: 13px; }
  .step a { color: var(--accent); }

  footer {
    padding: 40px 0 60px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13.5px;
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>

  let currentLang = "th";
  let latestTag = null;

  function detectLang() {
    const saved = localStorage.getItem("lang");
    if (saved && I18N[saved]) return saved;
    for (const l of navigator.languages || [navigator.language || "th"]) {
      const code = (l || "").slice(0, 2).toLowerCase();
      if (I18N[code]) return code;
    }
    return "th";
  }

  function updateVersionNote() {
    const t = I18N[currentLang];
    const note = document.getElementById("version-note");
    note.textContent = latestTag
      ? `${t.latestFmt.replace("{v}", latestTag)} · ${t.macFree}`
      : t.macFree;
  }

  function applyLang(lang) {
    currentLang = I18N[lang] ? lang : "th";
    const t = I18N[currentLang];
    document.documentElement.lang = currentLang;
    document.title = t.title;
    document.querySelector('meta[name="description"]').setAttribute("content", t.metaDesc);
    document.querySelectorAll("[data-i18n]").forEach(el => {
      const val = t[el.dataset.i18n];
      if (val !== undefined) el.innerHTML = val;
    });
    document.getElementById("lang-select").value = currentLang;
    localStorage.setItem("lang", currentLang);
    updateVersionNote();
  }

  document.getElementById("lang-select").addEventListener("change", e => applyLang(e.target.value));
  applyLang(detectLang());

  // ชี้ปุ่มดาวน์โหลดไปที่ไฟล์ zip ของ release ล่าสุดโดยตรง
  fetch("https://api.github.com/repos/ThanakornLC/ClaudeUsageWidget-releases/releases/latest")
    .then(r => r.ok ? r.json() : null)
    .then(release => {
      if (!release) return;
      const asset = (release.assets || []).find(a => a.name.endsWith(".zip"));
      if (asset) {
        document.getElementById("download-btn").href = asset.browser_download_url;
      }
      latestTag = release.tag_name;
      updateVersionNote();
    })
    .catch(() => {});
